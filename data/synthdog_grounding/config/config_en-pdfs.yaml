# English config using HuggingFace FinePDFs corpus (PDF-extracted text).
_base: config/config_base.yaml

document:
  content:
    text:
      type: huggingface
      dataset_name: "HuggingFaceFW/finepdfs"
      split: "train"
      streaming: true
      buffer_size: 1000
      charset: ascii
    font:
      paths: [resources/font/en]
