quality: [50, 95]
landscape: 0.5
short_size: [720, 1024]
aspect_ratio: [1, 2]
emit_quads: false
min_bbox_area: 16
# Minimum WCAG-proxy contrast ratio across all text lines (10th vs 90th percentile
# grayscale luminance). Samples below this threshold are discarded at save time.
# WCAG AA = 4.5, WCAG A = 3.0. Set to 1.5 as a backstop; the primary guard is
# moving shadow to bg_effect so it cannot collapse text-vs-paper contrast.
min_contrast_ratio: 1.5

background:
  image:
    paths: [resources/background]
    weights: [1]

  effect:
    args:
      # gaussian blur
      - prob: 1
        args:
          sigma: [0, 10]

document:
  fullscreen: 0.5
  landscape: 0.5
  short_size: [480, 1024]
  aspect_ratio: [1, 2]

  paper:
    color:
      prob: 0.5
      rgb: [[0, 255], [0, 255], [0, 255]]
    image:
      paths: [resources/paper]
      weights: [1]
      alpha: [0, 0.2]
      grayscale: 1
      crop: 1

  content:
    margin: [0, 0.1]
    font:
      weights: [1]
      bold: 0
    layout:
      text_scale: [0.0334, 0.1]
      max_row: 10
      max_col: 3
      fill: [0.5, 1]
      full: 0.1
      align: [left, right, center]
      stack_spacing: [0.02, 0.06]
      stack_fill: [0.5, 1]
      stack_full: 0.1
    textbox:
      fill: [0.5, 1]
    # Text color has two mutually exclusive modes:
    #   content_color: fires first; if it fires, all lines share one color (uniform document look).
    #   textbox_color: only fires when content_color does not; each line gets its own shade (varied look).
    # textbox_color prob=1.0 makes per-line variation the default when content_color does not fire.
    # On dark backgrounds both are forced to prob=1.0, so content_color always wins (uniform light text).
    textbox_color:
      prob: 1.0
      args:
        colorize: 1
    content_color:
      prob: 0.2
      args:
        colorize: 1

  effect:
    args:
      # elastic distortion
      - prob: 1
        args:
          alpha: [0, 1]
          sigma: [0, 0.5]
      # gaussian noise
      - prob: 1
        args:
          scale: [0, 8]
          per_channel: 0
      # perspective
      - prob: 1
        args:
          weights: [750, 50, 50, 25, 25, 25, 25, 50]
          args:
            - percents: [[0.75, 1], [0.75, 1], [0.75, 1], [0.75, 1]]
            - percents: [[0.75, 1], [1, 1], [0.75, 1], [1, 1]]
            - percents: [[1, 1], [0.75, 1], [1, 1], [0.75, 1]]
            - percents: [[0.75, 1], [1, 1], [1, 1], [1, 1]]
            - percents: [[1, 1], [0.75, 1], [1, 1], [1, 1]]
            - percents: [[1, 1], [1, 1], [0.75, 1], [1, 1]]
            - percents: [[1, 1], [1, 1], [1, 1], [0.75, 1]]
            - percents: [[1, 1], [1, 1], [1, 1], [1, 1]]

# Applied to the background layer only, BEFORE compositing paper and text.
# Shadow here is environmental (depth/atmosphere); it cannot darken the paper
# or text and therefore cannot collapse text-vs-paper contrast.
bg_effect:
  args:
    # shadow
    - prob: 1
      args:
        intensity: [0, 80]
        amount: [0, 0.5]
        smoothing: [0.5, 1]
        bidirectional: 0

# Applied to the merged document layer (paper + text), BEFORE compositing with bg.
# Weaker than the original shadow to restore page-level depth while limiting
# contrast collapse. The backstop in save() catches remaining failures.
doc_effect:
  args:
    # shadow
    - prob: 1
      args:
        intensity: [0, 80]
        amount: [0, 0.5]
        smoothing: [0.5, 1]
        bidirectional: 0

effect:
  args:
    # color
    - prob: 0.2
      args:
        rgb: [[0, 255], [0, 255], [0, 255]]
        alpha: [0, 0.2]
    # contrast
    - prob: 1
      args:
        alpha: [1, 1.5]
    # brightness
    - prob: 1
      args:
        beta: [-32, 32]
    # motion blur
    - prob: 0.5
      args:
        k: [3, 5]
        angle: [0, 360]
    # gaussian blur
    - prob: 1
      args:
        sigma: [0, 1.5]
