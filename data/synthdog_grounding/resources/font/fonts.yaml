# Font manifest for SynthDoG.
# Run `uv run python fetch_fonts.py` from the synthdog_grounding/ directory
# to download all fonts listed here.
#
# Each entry specifies:
#   filename  - target filename within lang/ subdirectory
#   lang      - language subdirectory (en, ja, ko, zh)
#   url       - stable download URL (for downloadable fonts)
#   zip_path  - path inside zip archive (when url points to a zip)
#   sha256    - integrity checksum
#   license   - SPDX license identifier
#   source    - human-readable origin
#
# Fonts are split into two categories:
#   - "download" fonts: fetched on demand via fetch_fonts.py
#   - "bundled" fonts:  small stylized fonts committed to git

