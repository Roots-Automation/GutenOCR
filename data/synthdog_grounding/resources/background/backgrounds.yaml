# Background image manifest for SynthDoG.
# Run `uv run python fetch_wikimedia.py --manifest resources/background/backgrounds.yaml --root resources/background`
# from the synthdog_grounding/ directory to download all images listed here.
#
# Each entry specifies:
#   filename         - target filename within resources/background/
#   wikimedia_title  - Wikimedia Commons file title (e.g. "File:Foo.jpg")
#   thumbnail_width  - thumbnail width in px to request via the action API
#   sha256           - integrity checksum of the final on-disk file (null = needs first download)
#   license          - SPDX license identifier or plain description
#   source           - human-readable origin / Wikimedia Commons page URL
#   notes            - optional description of the scene
#
# Optional fields:
#   raw_sha256   - checksum of the raw downloaded file (before center_crop)
#   center_crop  - crop to this fraction of width/height, centred (e.g. 0.9)
#
# The original 9 NAVER-curated backgrounds (bedroom_83.jpg, bob+dylan_83.jpg,
# coffee_122.jpg, coffee_18.jpeg, crater_141.jpg, cream_124.jpg, eagle_110.jpg,
# farm_25.jpg, hiking_18.jpg) are committed directly and do not appear here.

