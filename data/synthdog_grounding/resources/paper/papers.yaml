# Paper texture manifest for SynthDoG.
# Run `uv run python fetch_wikimedia.py --manifest resources/paper/papers.yaml --root resources/paper`
# from the synthdog_grounding/ directory to download all textures listed here.
#
# Each entry specifies:
#   filename         - target filename within resources/paper/
#   wikimedia_title  - Wikimedia Commons file title (e.g. "File:Foo.jpg")
#   thumbnail_width  - thumbnail width in px to request via the action API
#   sha256           - integrity checksum of the final on-disk file (null = needs first download)
#   license          - SPDX license identifier or plain description
#   source           - human-readable origin / Wikimedia Commons page URL
#   notes            - optional description of the texture
#
# Optional fields:
#   raw_sha256   - checksum of the raw downloaded file (before center_crop)
#   center_crop  - crop to this fraction of width/height, centred (e.g. 0.9)

papers:
  # ── Aged / worn paper ─────────────────────────────────────────────────
  - filename: old_paper_aged.jpg
    wikimedia_title: "File:Old_Paper_texture.jpg"
    thumbnail_width: 1920
    sha256: 86842facbb2e1f82a3734bffe0baf6b0a87093c4ea71f7614f3503ffb794b716
    license: CC0-1.0
    source: https://commons.wikimedia.org/wiki/File:Old_Paper_texture.jpg
    notes: >
      Aged/yellowed paper texture with visible wear and fibrous grain.
      AI-generated (Leonardo AI), CC0. Author: leonardoai / Arka09185
      (Wikimedia Commons).

  # ── Ruled / lined paper ───────────────────────────────────────────────
  - filename: lined_paper_1941.jpg
    wikimedia_title: "File:Schreibpapier_1941_mit_schraegen_Hilfslinien_2.JPG"
    thumbnail_width: 1920
    sha256: 9d7ab99f1143806fd555cbf2d50f85c040f4d73f64e7bef84896cb65050d4115
    license: PD
    source: https://commons.wikimedia.org/wiki/File:Schreibpapier_1941_mit_schraegen_Hilfslinien_2.JPG
    notes: >
      Photo of real 1941 German writing paper with ruled lines and diagonal
      helper lines. Genuine paper grain and age. Public domain (author died
      70+ years ago).

  # ── Newsprint / vintage paper ─────────────────────────────────────────
  - filename: newsprint_1918.jpg
    wikimedia_title: "File:The_Howler_(1918)_-_DPLA_-_b4e815671fc8ec7e8ae252c7916b3a13_(page_6).jpg"
    thumbnail_width: 1920
    sha256: d996813a7ffe4104fb14a2fe7b185622393a6e60ed33d9f8d7e900f577967c48
    license: PD-US
    source: https://commons.wikimedia.org/wiki/File:The_Howler_(1918)_-_DPLA_-_b4e815671fc8ec7e8ae252c7916b3a13_(page_6).jpg
    notes: >
      Blank page from The Howler (1918 Wake Forest College yearbook), digitized
      via DPLA. Aged newsprint texture. Public domain (US, pre-1931).

  # ── Crumpled paper ────────────────────────────────────────────────────
  - filename: crumpled_paper.jpg
    wikimedia_title: "File:Crumpled_olive_green_paper.jpg"
    thumbnail_width: 1920
    sha256: 06b15c94792f23354d179174a516db146f5cec943c046280fc95b6dc608369e1
    license: PD
    source: https://commons.wikimedia.org/wiki/File:Crumpled_olive_green_paper.jpg
    notes: >
      Crumpled olive green paper. Grayscale conversion retains crumple/shadow
      detail. Public domain. Author: Photos Public Domain.

  # ── Cardboard ─────────────────────────────────────────────────────────
  - filename: cardboard.jpg
    wikimedia_title: "File:Cardboard-546867.jpg"
    thumbnail_width: 1920
    sha256: 8c4ea874b89bd905158b6ca8fcf33cdc4aa8e813637cecfaabea2d5805553a11
    license: CC0-1.0
    source: https://commons.wikimedia.org/wiki/File:Cardboard-546867.jpg
    notes: >
      Close-up cardboard texture. CC0. Author: Humusak (Pixabay).

  - filename: medical_minutes_1902.jpg
    wikimedia_title: "File:Minutes_of_the_Union_County_Medical_Society_-_DPLA_-_3782c38d992fb11c4f5d0516ec0b1558_(page_205).jpg"
    thumbnail_width: 1920
    raw_sha256: 00933f898df7ef1557f511882144fc46ddd9227d4a7aa1d674795c65dab463c2
    sha256: 58ac5999caa1ec8f5f450614c706eddc8c1d9e78b0bf370eb9299f4013eeb7d3
    center_crop: 0.9
    license: PD-US
    source: https://commons.wikimedia.org/wiki/File:Minutes_of_the_Union_County_Medical_Society_-_DPLA_-_3782c38d992fb11c4f5d0516ec0b1558_(page_205).jpg
    notes: >
      Blank page from Minutes of the Union County Medical Society (1902-1922),
      digitized via DPLA / NC Digital Heritage Center. Aged document paper.
      Public domain (US, pre-1931). Cropped to inner 90% to remove scan
      margins.
